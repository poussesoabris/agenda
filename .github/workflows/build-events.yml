# Régénère events.json depuis OpenAgenda et le publie sur GitHub Pages.
# Déclencheurs : toutes les 15 min (cron, minute décalée pour éviter la congestion),
# bouton manuel (workflow_dispatch), et chaque push sur main.
name: Build agenda events

on:
  schedule:
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Générer events.json
        run: node build-events.js
        env:
          # Clé API v2 OpenAgenda (secret du dépôt). Absente → repli sur
          # l'export legacy public. La poser suffit à basculer sur l'API v2.
          OPENAGENDA_KEY: ${{ secrets.OPENAGENDA_KEY }}

      - name: Tests
        run: node test-events.js

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
